name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS + Windows (built on macOS runner) ──────────────────────────────────
  build-macos:
    name: Build macOS + Windows
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install zig
        run: brew install zig

      - name: Build
        run: |
          chmod +x build.sh
          SKIP_LINUX=1 ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-macos-windows
          path: bin/

  # ── Linux (built on Linux runner — ALSA headers available) ───────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install zig
        run: |
          ZIG_VERSION="0.13.0"
          curl -sSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" \
            | tar -xJ -C /usr/local
          ln -s "/usr/local/zig-linux-x86_64-${ZIG_VERSION}/zig" /usr/local/bin/zig

      - name: Install ALSA headers
        run: sudo apt-get install -y libasound2-dev

      - name: Build
        run: |
          chmod +x build.sh
          SKIP_WINDOWS=1 ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-linux
          path: bin/

  # ── Create GitHub Release with all binaries ───────────────────────────────────
  release:
    name: Create Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries-macos-windows
          path: bin/

      - uses: actions/download-artifact@v4
        with:
          name: binaries-linux
          path: bin/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            bin/*

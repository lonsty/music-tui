name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS + Windows (built on macOS runner) ──────────────────────────────────
  build-macos:
    name: Build macOS + Windows
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: mlugg/setup-zig@v2

      - name: Build
        run: |
          chmod +x build.sh
          SKIP_LINUX=1 ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-macos-windows
          path: bin/

  # ── Linux (built on Linux runner) ────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: mlugg/setup-zig@v2

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture arm64
          # Restrict existing sources to amd64/i386 so apt won't try to fetch
          # arm64 packages from archive.ubuntu.com / security.ubuntu.com
          # (arm64 is only on ports.ubuntu.com for Ubuntu 24.04+).
          sudo sed -i \
            -e 's|^deb \(https\?://[^ ]*ubuntu\.com[^ ]*\) |deb [arch=amd64,i386] \1 |' \
            /etc/apt/sources.list /etc/apt/sources.list.d/*.list 2>/dev/null || true
          # Add arm64 sources from ports.ubuntu.com
          CODENAME=$(lsb_release -cs)
          printf 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports %s main restricted universe multiverse\n' \
            "$CODENAME" "${CODENAME}-updates" "${CODENAME}-security" \
            | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update -qq
          sudo apt-get install -y libasound2-dev libasound2-dev:arm64

      - name: Build
        run: |
          chmod +x build.sh
          SKIP_WINDOWS=1 ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-linux
          path: bin/

  # ── Create GitHub Release with all binaries ───────────────────────────────────
  release:
    name: Create Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries-macos-windows
          path: bin/

      - uses: actions/download-artifact@v4
        with:
          name: binaries-linux
          path: bin/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            bin/*

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS + Windows (built on macOS runner) ──────────────────────────────────
  build-macos:
    name: Build macOS + Windows
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: mlugg/setup-zig@v2

      - name: Build
        run: |
          chmod +x build.sh
          SKIP_LINUX=1 ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-macos-windows
          path: bin/

  # ── Linux (built on Linux runner) ────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: mlugg/setup-zig@v2

      - name: Install build dependencies
        run: |
          # Add arm64 architecture for cross-compilation
          sudo dpkg --add-architecture arm64
          # Ubuntu 22.04 (jammy) runner — update sources to support multi-arch
          sudo bash -c 'cat > /etc/apt/sources.list << EOF
deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse
deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse
deb [arch=amd64,i386] http://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse
deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
EOF'
          sudo apt-get update -qq
          sudo apt-get install -y libasound2-dev libasound2-dev:arm64

      - name: Build
        run: |
          chmod +x build.sh
          SKIP_WINDOWS=1 ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-linux
          path: bin/

  # ── Create GitHub Release with all binaries ───────────────────────────────────
  release:
    name: Create Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries-macos-windows
          path: bin/

      - uses: actions/download-artifact@v4
        with:
          name: binaries-linux
          path: bin/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            bin/*
